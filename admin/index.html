<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard | APEX DRIVE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rosso:#B8272D; --black:#0a0a0a; --dark:#111; --white:#F0EDE8;
      --ink:#1a1a1a; --ink-light:#484848; --ink-muted:#888;
      --border:rgba(255,255,255,0.09);
      --font-display:'Bebas Neue',sans-serif;
      --font-condensed:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{
      min-height:100%;
      background:var(--dark);
      color:var(--white);
      font-family:var(--font-body);
      font-weight:300;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.022;
      pointer-events:none;
      z-index:0;
    }

    /* HEADER */
    .admin-header{
      position:fixed;
      top:0;left:0;right:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:1rem 2.5rem;
      background:rgba(10,10,10,0.98);
      border-bottom:1px solid var(--border);
    }
    .admin-logo{
      font-family:var(--font-display);
      font-size:1.6rem;
      letter-spacing:0.12em;
      color:var(--white);
      text-decoration:none;
    }
    .admin-logo span{color:var(--rosso);}
    .admin-nav{display:flex;align-items:center;gap:2rem;}
    .admin-nav a{
      font-family:var(--font-condensed);
      font-size:0.72rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.4);
      text-decoration:none;
      transition:color 0.2s;
    }
    .admin-nav a:hover,.admin-nav a.active{color:var(--white);}
    .btn-logout{
      font-family:var(--font-condensed);
      font-size:0.65rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      background:transparent;
      border:1px solid var(--border);
      color:rgba(255,255,255,0.35);
      padding:0.55rem 1.2rem;
      cursor:pointer;
      transition:all 0.2s;
    }
    .btn-logout:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}

    /* MAIN */
    .admin-main{
      position:relative;
      z-index:1;
      padding:7rem 2.5rem 4rem;
      max-width:1100px;
      margin:0 auto;
    }
    .page-title{
      font-family:var(--font-display);
      font-size:clamp(3rem,6vw,5rem);
      letter-spacing:0.04em;
      color:var(--white);
      line-height:0.9;
      margin-bottom:0.5rem;
    }
    .page-subtitle{
      font-family:var(--font-condensed);
      font-size:0.8rem;
      letter-spacing:0.16em;
      color:var(--ink-muted);
      text-transform:uppercase;
      margin-bottom:3rem;
    }

    /* STAT CARDS */
    .stat-cards{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:2px;
      max-width:700px;
    }
    .stat-card{
      background:rgba(255,255,255,0.025);
      border:1px solid var(--border);
      padding:2.5rem 2rem;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
    }
    .stat-number{
      font-family:var(--font-display);
      font-size:4.5rem;
      line-height:1;
      color:var(--rosso);
    }
    .stat-label{
      font-family:var(--font-condensed);
      font-size:0.72rem;
      letter-spacing:0.26em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.3);
      margin-bottom:1rem;
    }
    .btn-manage{
      display:inline-block;
      font-family:var(--font-condensed);
      font-size:0.65rem;
      letter-spacing:0.2em;
      text-transform:uppercase;
      background:transparent;
      border:1px solid var(--border);
      color:rgba(255,255,255,0.4);
      padding:0.6rem 1.4rem;
      text-decoration:none;
      transition:all 0.2s;
      align-self:flex-start;
    }
    .btn-manage:hover{background:var(--rosso);border-color:var(--rosso);color:var(--white);}

    @media(max-width:600px){
      .admin-header{padding:1rem 1.2rem;}
      .stat-cards{grid-template-columns:1fr;}
      .admin-main{padding:6rem 1.2rem 3rem;}
    }
  </style>
</head>
<body>

<header class="admin-header">
  <a href="/admin/" class="admin-logo">APEX<span>.</span>DRIVE</a>
  <nav class="admin-nav">
    <a href="/admin/events.html">Events</a>
    <a href="/admin/tours.html">Tours</a>
    <button class="btn-logout" id="logoutBtn">Log Out</button>
  </nav>
</header>

<main class="admin-main">
  <div class="page-title">DASHBOARD</div>
  <div class="page-subtitle">Manage your events and tours</div>

  <div class="stat-cards">
    <div class="stat-card">
      <div class="stat-number" id="eventsCount">--</div>
      <div class="stat-label">Events</div>
      <a href="/admin/events.html" class="btn-manage">Manage Events</a>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="toursCount">--</div>
      <div class="stat-label">Tours</div>
      <a href="/admin/tours.html" class="btn-manage">Manage Tours</a>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://xjwscbygqkyvrkpmooak.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_k8LLG_aCQx7UsD4r0QwKGw_JxrEsrWU';
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Auth guard
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/admin/login.html';
  }

  // Fetch counts
  const [eventsRes, toursRes] = await Promise.all([
    sb.from('events').select('id', { count: 'exact', head: true }),
    sb.from('tours').select('id', { count: 'exact', head: true })
  ]);

  document.getElementById('eventsCount').textContent = eventsRes.count ?? '0';
  document.getElementById('toursCount').textContent = toursRes.count ?? '0';

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/admin/login.html';
  });
</script>
</body>
</html>
