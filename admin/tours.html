<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tours | APEX DRIVE Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rosso:#B8272D; --black:#0a0a0a; --dark:#111; --white:#F0EDE8;
      --ink:#1a1a1a; --ink-light:#484848; --ink-muted:#888;
      --border:rgba(255,255,255,0.09);
      --font-display:'Bebas Neue',sans-serif;
      --font-condensed:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--dark);
      color:var(--white);
      font-family:var(--font-body);
      font-weight:300;
      min-height:100vh;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.022;
      pointer-events:none;
      z-index:0;
    }

    /* HEADER */
    .admin-header{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:1rem 2.5rem;
      background:rgba(10,10,10,0.98);
      border-bottom:1px solid var(--border);
    }
    .admin-logo{font-family:var(--font-display);font-size:1.6rem;letter-spacing:0.12em;color:var(--white);text-decoration:none;}
    .admin-logo span{color:var(--rosso);}
    .admin-nav{display:flex;align-items:center;gap:2rem;}
    .admin-nav a{font-family:var(--font-condensed);font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);text-decoration:none;transition:color 0.2s;}
    .admin-nav a:hover{color:var(--white);}
    .admin-nav a.active{color:var(--white);}
    .btn-logout{font-family:var(--font-condensed);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:rgba(255,255,255,0.35);padding:0.55rem 1.2rem;cursor:pointer;transition:all 0.2s;}
    .btn-logout:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}

    /* MAIN */
    .admin-main{position:relative;z-index:1;padding:7rem 2.5rem 5rem;max-width:1200px;margin:0 auto;}

    .section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
    .page-title{font-family:var(--font-display);font-size:clamp(2.5rem,5vw,4rem);letter-spacing:0.04em;color:var(--white);line-height:0.9;}
    .btn-add{font-family:var(--font-condensed);font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;background:var(--rosso);border:none;color:var(--white);padding:0.75rem 1.6rem;cursor:pointer;transition:opacity 0.2s;}
    .btn-add:hover{opacity:0.85;}

    /* TABLE */
    .table-wrap{overflow-x:auto;margin-bottom:3rem;}
    table{width:100%;border-collapse:collapse;}
    thead tr{border-bottom:1px solid var(--border);}
    th{font-family:var(--font-condensed);font-size:0.6rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--ink-muted);padding:0.7rem 1rem;text-align:left;white-space:nowrap;}
    td{padding:0.85rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.85rem;color:rgba(255,255,255,0.65);vertical-align:middle;}
    tr:hover td{background:rgba(255,255,255,0.02);}
    .td-name{font-family:var(--font-condensed);font-weight:600;color:var(--white);font-size:0.9rem;letter-spacing:0.04em;}
    .td-actions{display:flex;gap:0.6rem;align-items:center;}
    .btn-edit,.btn-delete{font-family:var(--font-condensed);font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;padding:0.4rem 0.9rem;cursor:pointer;border:1px solid;transition:all 0.2s;}
    .btn-edit{background:transparent;border-color:var(--border);color:rgba(255,255,255,0.45);}
    .btn-edit:hover{border-color:rgba(255,255,255,0.4);color:var(--white);}
    .btn-delete{background:transparent;border-color:rgba(184,39,45,0.3);color:rgba(184,39,45,0.6);}
    .btn-delete:hover{background:var(--rosso);border-color:var(--rosso);color:var(--white);}

    /* AVAILABILITY BADGES */
    .badge{display:inline-block;font-family:var(--font-condensed);font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;padding:0.25rem 0.7rem;border:1px solid;}
    .badge-available{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);color:rgba(34,197,94,0.85);}
    .badge-limited{background:rgba(251,191,36,0.08);border-color:rgba(251,191,36,0.3);color:rgba(251,191,36,0.85);}
    .badge-enquire{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);}

    /* FORM */
    .form-section{
      background:rgba(255,255,255,0.025);
      border:1px solid var(--border);
      padding:2.5rem;
      display:none;
    }
    .form-section.visible{display:block;}
    .form-title{font-family:var(--font-display);font-size:2rem;letter-spacing:0.06em;color:var(--white);margin-bottom:2rem;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
    .form-full{grid-column:1/-1;}
    .form-group{display:flex;flex-direction:column;gap:0.45rem;}
    .form-group label{font-family:var(--font-condensed);font-size:0.6rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(255,255,255,0.35);}
    .form-group input,.form-group textarea,.form-group select{
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      color:var(--white);
      font-family:var(--font-body);
      font-size:0.88rem;
      padding:0.7rem 0.9rem;
      outline:none;
      transition:border-color 0.2s;
      width:100%;
    }
    .form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:rgba(255,255,255,0.25);}
    .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.2);}
    .form-group textarea{resize:vertical;min-height:90px;}
    .form-group select option{background:#222;color:var(--white);}
    .photo-preview{width:160px;height:100px;object-fit:cover;margin-top:0.5rem;border:1px solid var(--border);display:none;}
    .form-actions{display:flex;gap:1rem;margin-top:1.8rem;}
    .btn-save{font-family:var(--font-condensed);font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;background:var(--rosso);border:none;color:var(--white);padding:0.85rem 2rem;cursor:pointer;transition:opacity 0.2s;}
    .btn-save:hover{opacity:0.85;}
    .btn-save:disabled{opacity:0.5;cursor:not-allowed;}
    .btn-cancel{font-family:var(--font-condensed);font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;background:transparent;border:1px solid var(--border);color:rgba(255,255,255,0.4);padding:0.85rem 2rem;cursor:pointer;transition:all 0.2s;}
    .btn-cancel:hover{border-color:rgba(255,255,255,0.3);color:var(--white);}

    .table-empty{padding:3rem 0;text-align:center;font-family:var(--font-condensed);font-size:0.75rem;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.2);}
    .form-msg{font-family:var(--font-condensed);font-size:0.7rem;letter-spacing:0.1em;color:var(--rosso);margin-top:0.8rem;}

    @media(max-width:700px){
      .admin-header{padding:1rem 1.2rem;}
      .admin-main{padding:6rem 1.2rem 3rem;}
      .form-grid{grid-template-columns:1fr;}
      .form-full{grid-column:1;}
    }
  </style>
</head>
<body>

<header class="admin-header">
  <a href="/admin/" class="admin-logo">APEX<span>.</span>DRIVE</a>
  <nav class="admin-nav">
    <a href="/admin/events.html">Events</a>
    <a href="/admin/tours.html" class="active">Tours</a>
    <button class="btn-logout" id="logoutBtn">Log Out</button>
  </nav>
</header>

<main class="admin-main">
  <div class="section-top">
    <div class="page-title">TOURS</div>
    <button class="btn-add" id="addNewBtn">+ Add New Tour</button>
  </div>

  <div class="table-wrap">
    <table id="toursTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Days</th>
          <th>Location</th>
          <th>Availability</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="toursTableBody">
        <tr><td colspan="5" class="table-empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="form-section" id="formSection">
    <div class="form-title" id="formTitle">ADD TOUR</div>
    <form id="tourForm" novalidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="f-name">Tour Name *</label>
          <input type="text" id="f-name" required/>
        </div>
        <div class="form-group">
          <label for="f-location">Location *</label>
          <input type="text" id="f-location" required/>
        </div>
        <div class="form-group">
          <label for="f-region">Region</label>
          <input type="text" id="f-region" placeholder="e.g. North Wales"/>
        </div>
        <div class="form-group">
          <label for="f-days">Days</label>
          <select id="f-days"></select>
        </div>
        <div class="form-group form-full">
          <label for="f-description">Description *</label>
          <textarea id="f-description" required></textarea>
        </div>
        <div class="form-group form-full">
          <label for="f-includes">Includes</label>
          <textarea id="f-includes" placeholder="One item per line — each becomes a bullet point"></textarea>
        </div>
        <div class="form-group">
          <label for="f-price">Price</label>
          <input type="text" id="f-price" placeholder="e.g. £595"/>
        </div>
        <div class="form-group">
          <label for="f-availability">Availability</label>
          <select id="f-availability">
            <option value="available">Available</option>
            <option value="limited">Limited</option>
            <option value="enquire">Enquire</option>
          </select>
        </div>
        <div class="form-group">
          <label for="f-video-url">Video URL</label>
          <input type="text" id="f-video-url" placeholder="YouTube URL — replaces photo if set"/>
        </div>
        <div class="form-group form-full">
          <label for="f-photo">Photo</label>
          <input type="file" id="f-photo" accept="image/*"/>
          <img class="photo-preview" id="photoPreview" alt="Preview"/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save" id="saveBtn">Save Tour</button>
        <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
      </div>
      <div class="form-msg" id="formMsg"></div>
    </form>
  </div>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://xjwscbygqkyvrkpmooak.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_k8LLG_aCQx7UsD4r0QwKGw_JxrEsrWU';
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Auth guard
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/admin/login.html'; }

  let editingId = null;
  let allTours = [];

  // ── Days select ───────────────────────────────────────────────────────────

  function formatDays(n) {
    n = parseInt(n);
    if (n === 1) return '1 Day';
    return n + ' Days / ' + (n - 1) + ' ' + (n - 1 === 1 ? 'Night' : 'Nights');
  }

  const daysSelect = document.getElementById('f-days');
  for (let i = 1; i <= 14; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = formatDays(i);
    daysSelect.appendChild(opt);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function uploadFile(file, folder) {
    const ext = file.name.split('.').pop();
    const path = `${folder}/${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('media').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data } = sb.storage.from('media').getPublicUrl(path);
    return data.publicUrl;
  }

  // ── Load & Render ─────────────────────────────────────────────────────────

  async function loadTours() {
    const { data, error } = await sb.from('tours').select('*').order('name', { ascending: true });
    if (error) {
      document.getElementById('toursTableBody').innerHTML = '<tr><td colspan="5" class="table-empty">Failed to load tours.</td></tr>';
      return;
    }
    allTours = data || [];
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('toursTableBody');
    if (allTours.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No tours yet. Add one above.</td></tr>';
      return;
    }
    tbody.innerHTML = allTours.map(t => `
      <tr>
        <td class="td-name">${escHtml(t.name)}</td>
        <td>${t.days ? formatDays(t.days) : '--'}</td>
        <td>${escHtml(t.location || '')}</td>
        <td><span class="badge badge-${t.availability || 'available'}">${t.availability || 'available'}</span></td>
        <td class="td-actions">
          <button class="btn-edit" onclick="editTour('${t.id}')">Edit</button>
          <button class="btn-delete" onclick="deleteTour('${t.id}')">Delete</button>
        </td>
      </tr>
    `).join('');
  }

  // ── Edit ──────────────────────────────────────────────────────────────────

  window.editTour = function(id) {
    const t = allTours.find(x => x.id === id);
    if (!t) return;
    editingId = id;
    document.getElementById('formTitle').textContent = 'EDIT TOUR';
    document.getElementById('f-name').value = t.name || '';
    document.getElementById('f-location').value = t.location || '';
    document.getElementById('f-region').value = t.region || '';
    document.getElementById('f-days').value = t.days || 1;
    document.getElementById('f-description').value = t.description || '';
    document.getElementById('f-includes').value = t.includes || '';
    document.getElementById('f-price').value = t.price || '';
    document.getElementById('f-availability').value = t.availability || 'available';
    document.getElementById('f-video-url').value = t.video_url || '';
    document.getElementById('f-photo').value = '';

    const preview = document.getElementById('photoPreview');
    if (t.photo_url) {
      preview.src = t.photo_url;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }

    showForm();
  };

  // ── Delete ────────────────────────────────────────────────────────────────

  window.deleteTour = async function(id) {
    if (!confirm('Delete this tour? This cannot be undone.')) return;
    const { error } = await sb.from('tours').delete().eq('id', id);
    if (error) { alert('Delete failed: ' + error.message); return; }
    await loadTours();
  };

  // ── Form show/hide ────────────────────────────────────────────────────────

  function showForm() {
    const fs = document.getElementById('formSection');
    fs.classList.add('visible');
    fs.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function hideForm() {
    document.getElementById('formSection').classList.remove('visible');
    document.getElementById('tourForm').reset();
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('formMsg').textContent = '';
    editingId = null;
  }

  document.getElementById('addNewBtn').addEventListener('click', () => {
    editingId = null;
    document.getElementById('tourForm').reset();
    document.getElementById('photoPreview').style.display = 'none';
    document.getElementById('formMsg').textContent = '';
    document.getElementById('formTitle').textContent = 'ADD TOUR';
    showForm();
  });

  document.getElementById('cancelBtn').addEventListener('click', hideForm);

  // ── Photo preview ─────────────────────────────────────────────────────────

  document.getElementById('f-photo').addEventListener('change', (e) => {
    const file = e.target.files[0];
    const preview = document.getElementById('photoPreview');
    if (!file) { preview.style.display = 'none'; return; }
    const reader = new FileReader();
    reader.onload = (ev) => { preview.src = ev.target.result; preview.style.display = 'block'; };
    reader.readAsDataURL(file);
  });

  // ── Form Submit ───────────────────────────────────────────────────────────

  document.getElementById('tourForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById('saveBtn');
    const msgEl = document.getElementById('formMsg');
    msgEl.textContent = '';
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving...';

    try {
      let photoUrl = null;

      if (editingId) {
        const existing = allTours.find(t => t.id === editingId);
        photoUrl = existing ? (existing.photo_url || null) : null;
      }

      const photoFile = document.getElementById('f-photo').files[0];
      if (photoFile) {
        photoUrl = await uploadFile(photoFile, 'tours');
      }

      const payload = {
        name: document.getElementById('f-name').value.trim(),
        location: document.getElementById('f-location').value.trim(),
        region: document.getElementById('f-region').value.trim() || null,
        days: parseInt(document.getElementById('f-days').value),
        description: document.getElementById('f-description').value.trim(),
        includes: document.getElementById('f-includes').value.trim() || null,
        price: document.getElementById('f-price').value.trim() || null,
        availability: document.getElementById('f-availability').value,
        photo_url: photoUrl,
        video_url: document.getElementById('f-video-url').value.trim() || null,
      };

      let error;
      if (editingId) {
        ({ error } = await sb.from('tours').update(payload).eq('id', editingId));
      } else {
        ({ error } = await sb.from('tours').insert(payload));
      }

      if (error) throw error;

      hideForm();
      await loadTours();
    } catch (err) {
      msgEl.textContent = 'Error: ' + (err.message || 'Something went wrong.');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save Tour';
    }
  });

  // ── Logout ────────────────────────────────────────────────────────────────

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = '/admin/login.html';
  });

  // ── Init ──────────────────────────────────────────────────────────────────

  await loadTours();
</script>
</body>
</html>
