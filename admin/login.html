<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | APEX DRIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rosso:#B8272D; --black:#0a0a0a; --dark:#111; --white:#F0EDE8;
      --ink:#1a1a1a; --ink-light:#484848; --ink-muted:#888;
      --border:rgba(255,255,255,0.09);
      --font-display:'Bebas Neue',sans-serif;
      --font-condensed:'Barlow Condensed',sans-serif;
      --font-body:'Barlow',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{height:100%;}
    body{
      min-height:100%;
      background:var(--dark);
      color:var(--white);
      font-family:var(--font-body);
      font-weight:300;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity:0.022;
      pointer-events:none;
      z-index:0;
    }
    .login-box{
      position:relative;
      z-index:1;
      width:100%;
      max-width:380px;
      background:rgba(255,255,255,0.025);
      border:1px solid var(--border);
      padding:3rem 2.5rem;
    }
    .login-logo{
      font-family:var(--font-display);
      font-size:2.2rem;
      letter-spacing:0.12em;
      color:var(--white);
      text-decoration:none;
      display:block;
      text-align:center;
      margin-bottom:0.4rem;
    }
    .login-logo span{color:var(--rosso);}
    .login-subtitle{
      font-family:var(--font-condensed);
      font-size:0.65rem;
      letter-spacing:0.32em;
      text-transform:uppercase;
      font-variant:small-caps;
      color:var(--ink-muted);
      text-align:center;
      margin-bottom:2.5rem;
    }
    .form-group{margin-bottom:1.2rem;}
    .form-group label{
      display:block;
      font-family:var(--font-condensed);
      font-size:0.62rem;
      letter-spacing:0.22em;
      text-transform:uppercase;
      color:rgba(255,255,255,0.35);
      margin-bottom:0.5rem;
    }
    .form-group input{
      width:100%;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      color:var(--white);
      font-family:var(--font-body);
      font-size:0.9rem;
      padding:0.75rem 1rem;
      outline:none;
      transition:border-color 0.2s;
    }
    .form-group input:focus{border-color:rgba(255,255,255,0.25);}
    .form-group input::placeholder{color:rgba(255,255,255,0.2);}
    .btn-signin{
      width:100%;
      background:var(--rosso);
      color:var(--white);
      font-family:var(--font-condensed);
      font-size:0.72rem;
      letter-spacing:0.26em;
      text-transform:uppercase;
      border:none;
      padding:1rem;
      cursor:pointer;
      margin-top:0.4rem;
      transition:opacity 0.2s;
    }
    .btn-signin:hover{opacity:0.85;}
    .btn-signin:disabled{opacity:0.5;cursor:not-allowed;}
    .login-error{
      margin-top:1rem;
      font-family:var(--font-condensed);
      font-size:0.72rem;
      letter-spacing:0.08em;
      color:var(--rosso);
      text-align:center;
      min-height:1.2em;
    }
  </style>
</head>
<body>

<div class="login-box">
  <a href="/admin/" class="login-logo">APEX<span>.</span>DRIVE</a>
  <div class="login-subtitle">Admin Portal</div>

  <form id="loginForm" novalidate>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required/>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
    </div>
    <button type="submit" class="btn-signin" id="submitBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </form>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://xjwscbygqkyvrkpmooak.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_k8LLG_aCQx7UsD4r0QwKGw_JxrEsrWU';
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, go straight to dashboard
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = '/admin/';
  }

  const form = document.getElementById('loginForm');
  const errorEl = document.getElementById('loginError');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errorEl.textContent = 'Invalid email or password.';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    } else {
      window.location.href = '/admin/';
    }
  });
</script>
</body>
</html>
